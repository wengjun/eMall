server:
  port: 8090

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%level","service":"${spring.application.name}","traceId":"%X{traceId:-}","spanId":"%X{spanId:-}","requestId":"%X{requestId:-}","userId":"%X{userId:-}","orderId":"%X{orderId:-}","route":"%X{route:-}","status":"%X{status:-}","latencyMs":"%X{latencyMs:-}","thread":"%thread","logger":"%logger{40}","message":"%replace(%msg){''"'',''\"''}","exception":"%replace(%ex{short}){''"'',''\"''}"}%n'

spring:
  application:
    name: fulfillment
  datasource:
    url: ${EMALL_FULFILLMENT_DB_URL:jdbc:mysql://localhost:3306/emall_fulfillment?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${EMALL_DB_USERNAME:root}
    password: ${EMALL_DB_PASSWORD:root}
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${EMALL_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: fulfillment
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

emall:
  storage: jdbc
  events:
    order-topic: ${EMALL_ORDER_EVENTS_TOPIC:emall.order.events}
    order-dlt-topic: ${EMALL_ORDER_EVENTS_DLT_TOPIC:emall.order.events.dlt}
  fulfillment:
    default-warehouse-code: ${EMALL_DEFAULT_WAREHOUSE_CODE:WH-DEFAULT}

management:
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${EMALL_TRACING_SAMPLING_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${EMALL_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
