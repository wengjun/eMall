server:
  port: 8081

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%level","service":"${spring.application.name}","traceId":"%X{traceId:-}","spanId":"%X{spanId:-}","requestId":"%X{requestId:-}","userId":"%X{userId:-}","orderId":"%X{orderId:-}","route":"%X{route:-}","status":"%X{status:-}","latencyMs":"%X{latencyMs:-}","thread":"%thread","logger":"%logger{40}","message":"%replace(%msg){''"'',''\"''}","exception":"%replace(%ex{short}){''"'',''\"''}"}%n'

spring:
  application:
    name: user
  datasource:
    url: ${EMALL_USER_DB_URL:jdbc:mysql://localhost:3306/emall_user?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${EMALL_DB_USERNAME:root}
    password: ${EMALL_DB_PASSWORD:root}
  flyway:
    enabled: true

emall:
  storage: jdbc
  security:
    field-encryption:
      key: ${EMALL_FIELD_ENCRYPTION_KEY:local-development-field-encryption-key}

management:
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${EMALL_TRACING_SAMPLING_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${EMALL_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
