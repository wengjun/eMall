<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560">
    <defs>
        <style>
            .bg { fill: #fbfaf6; }
            .box { fill: #ffffff; stroke: #1f2d3d; stroke-width: 2; rx: 14; }
            .edge { fill: #eef5ff; stroke: #285f9f; stroke-width: 2; rx: 14; }
            .hot { fill: #fff4e8; stroke: #a35f00; stroke-width: 2; rx: 14; }
            .safe { fill: #eef9f0; stroke: #2f7d3b; stroke-width: 2; rx: 14; }
            .text { fill: #17202a; font-family: "Noto Sans SC", sans-serif; font-size: 18px; }
            .small { fill: #34495e; font-family: "Noto Sans SC", sans-serif; font-size: 14px; }
            .arrow { stroke: #17202a; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
            .dash { stroke: #7f8c8d; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#gray); }
        </style>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#17202a"/>
        </marker>
        <marker id="gray" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#7f8c8d"/>
        </marker>
    </defs>
    <rect class="bg" width="1100" height="560"/>
    <text x="42" y="46" class="text" style="font-size:24px;font-weight:700">秒杀系统削峰和防超卖链路</text>

    <rect x="50" y="100" width="135" height="76" class="box"/>
    <text x="87" y="132" class="text">用户</text>
    <text x="76" y="158" class="small">瞬时高并发</text>

    <rect x="240" y="88" width="155" height="100" class="edge"/>
    <text x="284" y="122" class="text">入口防护</text>
    <text x="266" y="150" class="small">CDN/限流/风控</text>
    <text x="272" y="172" class="small">资格校验</text>

    <rect x="455" y="88" width="155" height="100" class="hot"/>
    <text x="494" y="122" class="text">Redis Lua</text>
    <text x="481" y="150" class="small">原子预扣库存</text>
    <text x="486" y="172" class="small">一人一单</text>

    <rect x="670" y="88" width="155" height="100" class="hot"/>
    <text x="718" y="122" class="text">排队令牌</text>
    <text x="700" y="150" class="small">削峰进入队列</text>
    <text x="708" y="172" class="small">异步下单</text>

    <rect x="885" y="88" width="155" height="100" class="safe"/>
    <text x="934" y="122" class="text">交易确认</text>
    <text x="912" y="150" class="small">订单/库存/支付</text>
    <text x="920" y="172" class="small">数据库兜底</text>

    <path d="M185 138 H240" class="arrow"/>
    <path d="M395 138 H455" class="arrow"/>
    <path d="M610 138 H670" class="arrow"/>
    <path d="M825 138 H885" class="arrow"/>

    <rect x="160" y="300" width="780" height="110" class="box"/>
    <text x="190" y="335" class="text">隔离原则</text>
    <text x="190" y="365" class="small">秒杀流量使用独立入口、线程池、队列、Redis key 和数据库写入节奏</text>
    <text x="190" y="390" class="small">秒杀失败时优先保护普通下单、支付回调和订单查询链路</text>

    <path d="M747 188 V300" class="dash"/>
    <path d="M962 188 V300" class="dash"/>
</svg>
