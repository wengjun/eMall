<svg xmlns="http://www.w3.org/2000/svg" width="980" height="450" viewBox="0 0 980 450">
    <defs>
        <style>
            .bg { fill: #f8fbfb; }
            .box { fill: #ffffff; stroke: #1f2d3d; stroke-width: 2; rx: 14; }
            .db { fill: #eef5ff; stroke: #285f9f; stroke-width: 2; rx: 14; }
            .safe { fill: #eef9f0; stroke: #2f7d3b; stroke-width: 2; rx: 14; }
            .warn { fill: #fff4e8; stroke: #a35f00; stroke-width: 2; rx: 14; }
            .text { fill: #17202a; font-family: "Noto Sans SC", sans-serif; font-size: 18px; }
            .small { fill: #34495e; font-family: "Noto Sans SC", sans-serif; font-size: 14px; }
            .arrow { stroke: #17202a; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
        </style>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#17202a"/>
        </marker>
    </defs>
    <rect class="bg" width="980" height="450"/>
    <text x="42" y="46" class="text" style="font-size:24px;font-weight:700">
        库存防超卖和消费幂等的事务边界
    </text>

    <rect x="55" y="115" width="150" height="82" class="box"/>
    <text x="92" y="150" class="text">业务请求</text>
    <text x="81" y="177" class="small">下单/消息消费</text>

    <rect x="285" y="105" width="190" height="102" class="warn"/>
    <text x="334" y="140" class="text">幂等记录</text>
    <text x="312" y="168" class="small">唯一键防重复</text>
    <text x="312" y="190" class="small">eventId/requestId</text>

    <rect x="555" y="105" width="190" height="102" class="db"/>
    <text x="604" y="140" class="text">条件更新</text>
    <text x="582" y="168" class="small">available >= qty</text>
    <text x="582" y="190" class="small">影响行数判断结果</text>

    <rect x="805" y="115" width="130" height="82" class="safe"/>
    <text x="843" y="150" class="text">提交</text>
    <text x="828" y="177" class="small">同事务成功</text>

    <path d="M205 156 H285" class="arrow"/>
    <path d="M475 156 H555" class="arrow"/>
    <path d="M745 156 H805" class="arrow"/>

    <rect x="285" y="285" width="460" height="84" class="box"/>
    <text x="314" y="318" class="text">同一个数据库本地事务</text>
    <text x="314" y="346" class="small">插入幂等记录、库存条件更新、业务状态写入必须一起提交或回滚</text>

    <path d="M380 207 V285" class="arrow"/>
    <path d="M650 207 V285" class="arrow"/>
</svg>
