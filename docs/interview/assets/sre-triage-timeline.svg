<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540">
    <defs>
        <style>
            .bg { fill: #f8fbfb; }
            .box { fill: #ffffff; stroke: #1f2d3d; stroke-width: 2; rx: 14; }
            .metric { fill: #eef5ff; stroke: #285f9f; stroke-width: 2; rx: 14; }
            .risk { fill: #fff1f1; stroke: #a33a3a; stroke-width: 2; rx: 14; }
            .dep { fill: #fff4e8; stroke: #a35f00; stroke-width: 2; rx: 14; }
            .ok { fill: #eef9f0; stroke: #2f7d3b; stroke-width: 2; rx: 14; }
            .text { fill: #17202a; font-family: "Noto Sans SC", sans-serif; font-size: 18px; }
            .small { fill: #34495e; font-family: "Noto Sans SC", sans-serif; font-size: 14px; }
            .axis { stroke: #17202a; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
            .dash { stroke: #7f8c8d; stroke-width: 2; fill: none; stroke-dasharray: 7 6; }
        </style>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#17202a"/>
        </marker>
    </defs>
    <rect class="bg" width="1080" height="540"/>
    <text x="42" y="46" class="text" style="font-size:24px;font-weight:700">
        SRE 延迟和 CPU 故障排查时间线
    </text>

    <path d="M90 270 H1000" class="axis"/>
    <path d="M210 130 V410" class="dash"/>
    <path d="M420 130 V410" class="dash"/>
    <path d="M635 130 V410" class="dash"/>
    <path d="M850 130 V410" class="dash"/>

    <rect x="120" y="105" width="180" height="92" class="metric"/>
    <text x="160" y="140" class="text">业务指标</text>
    <text x="150" y="168" class="small">P99 / 错误率 / QPS</text>

    <rect x="335" y="105" width="180" height="92" class="risk"/>
    <text x="382" y="140" class="text">JVM</text>
    <text x="365" y="168" class="small">GC / heap / 线程</text>

    <rect x="550" y="105" width="180" height="92" class="dep"/>
    <text x="596" y="140" class="text">依赖</text>
    <text x="580" y="168" class="small">DB / Redis / HTTP</text>

    <rect x="765" y="105" width="180" height="92" class="ok"/>
    <text x="812" y="140" class="text">变更</text>
    <text x="795" y="168" class="small">发布 / 配置 / 活动</text>

    <rect x="120" y="340" width="825" height="95" class="box"/>
    <text x="150" y="375" class="text">判断根因</text>
    <text x="150" y="403" class="small">
        谁先异常、谁能解释后续现象、谁和用户影响强相关，谁更接近根因。
    </text>

    <text x="92" y="305" class="small">10:00</text>
    <text x="392" y="305" class="small">10:05</text>
    <text x="610" y="305" class="small">10:08</text>
    <text x="828" y="305" class="small">10:12</text>
</svg>
