<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="540" viewBox="0 0 1080 540">
    <defs>
        <style>
            .bg { fill: #f8fbfb; }
            .box { fill: #ffffff; stroke: #1f2d3d; stroke-width: 2; rx: 14; }
            .lang { fill: #eef5ff; stroke: #285f9f; stroke-width: 2; rx: 14; }
            .domain { fill: #fff4e8; stroke: #a35f00; stroke-width: 2; rx: 14; }
            .ops { fill: #eef9f0; stroke: #2f7d3b; stroke-width: 2; rx: 14; }
            .text { fill: #17202a; font-family: "Noto Sans SC", sans-serif; font-size: 18px; }
            .small { fill: #34495e; font-family: "Noto Sans SC", sans-serif; font-size: 14px; }
            .arrow { stroke: #17202a; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
        </style>
        <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto">
            <path d="M0,0 L0,6 L9,3 z" fill="#17202a"/>
        </marker>
    </defs>
    <rect class="bg" width="1080" height="540"/>
    <text x="42" y="46" class="text" style="font-size:24px;font-weight:700">
        Java 工程能力从语法到生产设计
    </text>

    <rect x="70" y="120" width="210" height="120" class="lang"/>
    <text x="128" y="155" class="text">语言特性</text>
    <text x="102" y="183" class="small">record / enum / Optional</text>
    <text x="102" y="205" class="small">泛型 / 集合 / 时间金额</text>

    <rect x="435" y="120" width="210" height="120" class="domain"/>
    <text x="493" y="155" class="text">业务建模</text>
    <text x="467" y="183" class="small">领域对象 / DTO / 异常</text>
    <text x="467" y="205" class="small">状态机 / 模块边界</text>

    <rect x="800" y="120" width="210" height="120" class="ops"/>
    <text x="858" y="155" class="text">生产治理</text>
    <text x="832" y="183" class="small">兼容 / 可测试 / 可观测</text>
    <text x="832" y="205" class="small">API 契约 / 版本演进</text>

    <rect x="250" y="340" width="580" height="88" class="box"/>
    <text x="312" y="376" class="text">面试高分表达</text>
    <text x="312" y="404" class="small">
        不只解释语法，还要说明它如何降低复杂度、减少故障和保护系统演进。
    </text>

    <path d="M280 180 H435" class="arrow"/>
    <path d="M645 180 H800" class="arrow"/>
    <path d="M540 240 V340" class="arrow"/>
</svg>
