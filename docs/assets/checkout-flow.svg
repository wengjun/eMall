<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #0f172a; }
      .head { font: 700 15px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #1e293b; }
      .text { font: 14px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.3; rx: 12; }
      .line { stroke: #334155; stroke-width: 1.6; marker-end: url(#arrow); }
      .life { stroke: #cbd5e1; stroke-width: 2; }
    </style>
  </defs>
  <rect width="1180" height="520" fill="#fff"/>
  <text x="40" y="50" class="title">下单流程图</text>
  <g class="head" text-anchor="middle">
    <text x="100" y="95">客户端</text><line x1="100" y1="110" x2="100" y2="470" class="life"/>
    <text x="260" y="95">网关</text><line x1="260" y1="110" x2="260" y2="470" class="life"/>
    <text x="430" y="95">订单</text><line x1="430" y1="110" x2="430" y2="470" class="life"/>
    <text x="600" y="95">价格</text><line x1="600" y1="110" x2="600" y2="470" class="life"/>
    <text x="760" y="95">营销</text><line x1="760" y1="110" x2="760" y2="470" class="life"/>
    <text x="920" y="95">库存</text><line x1="920" y1="110" x2="920" y2="470" class="life"/>
    <text x="1080" y="95">Outbox / MQ</text><line x1="1080" y1="110" x2="1080" y2="470" class="life"/>
  </g>
  <g class="text">
    <line x1="100" y1="140" x2="260" y2="140" class="line"/><text x="125" y="132">POST /api/orders</text>
    <line x1="260" y1="185" x2="430" y2="185" class="line"/><text x="285" y="177">透传 X-Trace-Id</text>
    <line x1="430" y1="230" x2="600" y2="230" class="line"/><text x="455" y="222">生成价格快照</text>
    <line x1="430" y1="275" x2="760" y2="275" class="line"/><text x="455" y="267">生成优惠快照，可降级</text>
    <line x1="430" y1="320" x2="920" y2="320" class="line"/><text x="455" y="312">幂等预占库存</text>
    <line x1="430" y1="365" x2="1080" y2="365" class="line"/><text x="455" y="357">保存订单和 Outbox 事件</text>
    <line x1="430" y1="410" x2="260" y2="410" class="line"/><text x="305" y="402">CREATED / PENDING_RETRY</text>
    <line x1="260" y1="445" x2="100" y2="445" class="line"/><text x="128" y="437">返回下单结果</text>
  </g>
</svg>
