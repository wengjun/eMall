<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="390" viewBox="0 0 1120 390">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 28px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #0f172a; }
      .text { font: 15px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #0f172a; }
      .box { fill: #f8fafc; stroke: #64748b; stroke-width: 1.4; rx: 14; }
      .warn { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.4; rx: 14; }
      .ok { fill: #ecfdf5; stroke: #059669; stroke-width: 1.4; rx: 14; }
      .line { stroke: #334155; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1120" height="390" fill="#fff"/>
  <text x="40" y="50" class="title">补偿和人工恢复流程图</text>
  <rect x="55" y="160" width="125" height="60" class="warn"/><text x="118" y="196" class="text" text-anchor="middle">下游失败</text>
  <rect x="240" y="160" width="140" height="60" class="warn"/><text x="310" y="196" class="text" text-anchor="middle">待重试状态</text>
  <rect x="445" y="160" width="125" height="60" class="box"/><text x="508" y="196" class="text" text-anchor="middle">补偿任务</text>
  <rect x="635" y="160" width="125" height="60" class="box"/><text x="698" y="196" class="text" text-anchor="middle">重试调用</text>
  <rect x="825" y="90" width="130" height="60" class="ok"/><text x="890" y="126" class="text" text-anchor="middle">恢复成功</text>
  <rect x="825" y="225" width="130" height="60" class="warn"/><text x="890" y="261" class="text" text-anchor="middle">记录失败</text>
  <rect x="985" y="225" width="110" height="60" class="box"/><text x="1040" y="261" class="text" text-anchor="middle">人工处理</text>
  <path d="M180 190 H240" class="line"/>
  <path d="M380 190 H445" class="line"/>
  <path d="M570 190 H635" class="line"/>
  <path d="M760 178 L825 120" class="line"/>
  <path d="M760 202 L825 255" class="line"/>
  <path d="M890 225 C820 180 665 135 570 175" class="line"/>
  <path d="M955 255 H985" class="line"/>
  <path d="M1040 225 C1010 145 955 120 955 120" class="line"/>
</svg>
