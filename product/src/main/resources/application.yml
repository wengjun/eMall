server:
  port: 8082

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%level","service":"${spring.application.name}","traceId":"%X{traceId:-}","spanId":"%X{spanId:-}","requestId":"%X{requestId:-}","userId":"%X{userId:-}","orderId":"%X{orderId:-}","route":"%X{route:-}","status":"%X{status:-}","latencyMs":"%X{latencyMs:-}","thread":"%thread","logger":"%logger{40}","message":"%replace(%msg){''"'',''\"''}","exception":"%replace(%ex{short}){''"'',''\"''}"}%n'

spring:
  application:
    name: product
  cloud:
    nacos:
      server-addr: ${EMALL_NACOS_SERVER_ADDR:localhost:8848}
      discovery:
        enabled: ${EMALL_NACOS_DISCOVERY_ENABLED:false}
        namespace: ${EMALL_NACOS_NAMESPACE:public}
        group: ${EMALL_NACOS_GROUP:DEFAULT_GROUP}
      config:
        enabled: ${EMALL_NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false
    sentinel:
      enabled: ${EMALL_SENTINEL_ENABLED:false}
      transport:
        dashboard: ${EMALL_SENTINEL_DASHBOARD:localhost:8858}
        port: ${EMALL_SENTINEL_API_PORT:8719}
  datasource:
    url: ${EMALL_PRODUCT_DB_URL:jdbc:mysql://localhost:3306/emall_product?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${EMALL_DB_USERNAME:root}
    password: ${EMALL_DB_PASSWORD:root}
  data:
    redis:
      host: ${EMALL_REDIS_HOST:localhost}
      port: ${EMALL_REDIS_PORT:6379}
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${EMALL_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

emall:
  storage: jdbc
  cache:
    ttl: 300s
  internal:
    operations-token: ${EMALL_INTERNAL_OPERATIONS_TOKEN:local-dev-token}
  events:
    product-topic: ${EMALL_PRODUCT_EVENTS_TOPIC:emall.product.events}

management:
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${EMALL_TRACING_SAMPLING_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${EMALL_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
---
spring:
  config:
    activate:
      on-profile: redis-cluster
  data:
    redis:
      cluster:
        nodes: ${EMALL_REDIS_CLUSTER_NODES:localhost:6379}
        max-redirects: ${EMALL_REDIS_CLUSTER_MAX_REDIRECTS:5}
