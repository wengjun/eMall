x-app-runtime-env: &app-runtime-env
  EMALL_NACOS_SERVER_ADDR: ${EMALL_NACOS_SERVER_ADDR:-nacos:8848}
  EMALL_NACOS_DISCOVERY_ENABLED: ${EMALL_NACOS_DISCOVERY_ENABLED:-true}
  EMALL_NACOS_CONFIG_ENABLED: ${EMALL_NACOS_CONFIG_ENABLED:-false}
  EMALL_DB_USERNAME: ${EMALL_DB_USERNAME:-root}
  EMALL_DB_PASSWORD: ${EMALL_DB_PASSWORD:-root}
  EMALL_FIELD_ENCRYPTION_KEY: ${EMALL_FIELD_ENCRYPTION_KEY:-local-development-field-encryption-key}
  EMALL_INTERNAL_OPERATIONS_TOKEN: ${EMALL_INTERNAL_OPERATIONS_TOKEN:-local-dev-token}
  EMALL_REDIS_HOST: ${EMALL_REDIS_HOST:-redis}
  EMALL_KAFKA_BOOTSTRAP_SERVERS: ${EMALL_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
  EMALL_ELASTICSEARCH_URL: ${EMALL_ELASTICSEARCH_URL:-http://elasticsearch:9200}
  EMALL_CLICKHOUSE_URL: ${EMALL_CLICKHOUSE_URL:-jdbc:clickhouse://clickhouse:8123/emall}
  EMALL_OTLP_TRACES_ENDPOINT: ${EMALL_OTLP_TRACES_ENDPOINT:-http://otel-collector:4318/v1/traces}
  EMALL_RPC_PROTOCOL: ${EMALL_RPC_PROTOCOL:-dubbo}
  EMALL_DUBBO_REGISTRY_ADDRESS: ${EMALL_DUBBO_REGISTRY_ADDRESS:-nacos://nacos:8848}
  EMALL_DUBBO_PORT: ${EMALL_DUBBO_PORT:--1}

services:
  redis:
    image: redis:7.2
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - ./ops/mysql/init:/docker-entrypoint-initdb.d:ro

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:19092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  nacos:
    image: nacos/nacos-server:v2.4.3
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    ports:
      - "8123:8123"
      - "9000:9000"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    ports:
      - "5000:5000"
      - "9600:9600"
    volumes:
      - ./ops/elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.3
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch

  prometheus:
    image: prom/prometheus:v2.55.0
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/rules:/etc/prometheus/rules:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    command: ["--config=/etc/otelcol/config.yml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./ops/otel-collector.yml:/etc/otelcol/config.yml:ro

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3000:3000"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/dashboards:/var/lib/grafana/dashboards:ro

  gateway-app:
    profiles: ["app"]
    build:
      context: .
      args:
        MODULE: gateway
    ports:
      - "8080:8080"
    environment:
      <<: *app-runtime-env
      EMALL_USER_URL: http://user-app:8081
      EMALL_PRODUCT_URL: http://product-app:8082
      EMALL_INVENTORY_URL: http://inventory-app:8083
