apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: emall-public-gateway
spec:
  gatewayClassName: alb
  listeners:
    - name: http
      hostname: api.emall.example.com
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      hostname: api.emall.example.com
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: emall-gateway-tls
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: emall-http-to-https
spec:
  parentRefs:
    - name: emall-public-gateway
      sectionName: http
  hostnames:
    - api.emall.example.com
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: emall-api
spec:
  parentRefs:
    - name: emall-public-gateway
      sectionName: https
  hostnames:
    - api.emall.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: Strict-Transport-Security
                value: max-age=31536000; includeSubDomains
              - name: X-Content-Type-Options
                value: nosniff
              - name: X-Frame-Options
                value: DENY
      backendRefs:
        - name: gateway
          port: 8080
