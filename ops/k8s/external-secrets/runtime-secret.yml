apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: emall-secret-store
spec:
  provider:
    vault:
      server: https://vault.example.com
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: emall-runtime
          serviceAccountRef:
            name: order
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: emall-runtime-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: emall-secret-store
  target:
    name: emall-runtime-secret
    creationPolicy: Owner
  data:
    - secretKey: EMALL_DB_USERNAME
      remoteRef:
        key: emall/runtime
        property: dbUsername
    - secretKey: EMALL_DB_PASSWORD
      remoteRef:
        key: emall/runtime
        property: dbPassword
    - secretKey: EMALL_FIELD_ENCRYPTION_KEY
      remoteRef:
        key: emall/runtime
        property: fieldEncryptionKey
    - secretKey: EMALL_INTERNAL_OPERATIONS_TOKEN
      remoteRef:
        key: emall/runtime
        property: internalOperationsToken
