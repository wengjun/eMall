apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: inventory-downstream-latency
spec:
  action: delay
  mode: fixed-percent
  value: "50"
  selector:
    namespaces:
      - default
    labelSelectors:
      app: inventory
  duration: 10m
  delay:
    latency: 800ms
    correlation: "80"
    jitter: 100ms
  direction: to
  target:
    mode: all
    selector:
      namespaces:
        - default
      labelSelectors:
        app: order
