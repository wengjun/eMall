apiVersion: apps/v1
kind: Deployment
metadata:
  name: release
  labels:
    app: release
spec:
  replicas: 3
  selector:
    matchLabels:
      app: release
  template:
    metadata:
      labels:
        app: release
    spec:
      terminationGracePeriodSeconds: 45
      serviceAccountName: release
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: release
          image: emall/release:0.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8115
          envFrom:
            - configMapRef:
                name: emall-runtime-config
            - secretRef:
                name: emall-runtime-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8115
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8115
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: release
spec:
  selector:
    app: release
  ports:
    - name: http
      port: 8115
      targetPort: 8115
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: release
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: release
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: release
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: release
  minReplicas: 3
  maxReplicas: 80
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
