apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-warehouse
  labels:
    app: data-warehouse
spec:
  replicas: 3
  selector:
    matchLabels:
      app: data-warehouse
  template:
    metadata:
      labels:
        app: data-warehouse
    spec:
      terminationGracePeriodSeconds: 45
      serviceAccountName: data-warehouse
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: data-warehouse
          image: emall/data-warehouse:0.1.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8110
          envFrom:
            - configMapRef:
                name: emall-runtime-config
            - secretRef:
                name: emall-runtime-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8110
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8110
            initialDelaySeconds: 60
            periodSeconds: 10
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: data-warehouse
spec:
  selector:
    app: data-warehouse
  ports:
    - name: http
      port: 8110
      targetPort: 8110
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: data-warehouse
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: data-warehouse
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: data-warehouse
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: data-warehouse
  minReplicas: 3
  maxReplicas: 80
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
