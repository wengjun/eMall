apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-public-ingress-to-gateway
spec:
  podSelector:
    matchLabels:
      app: gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-services
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - user
          - product
          - inventory
          - order
          - cart
          - payment
          - pricing
          - marketing
          - search
          - fulfillment
          - review
          - after-sales
          - merchant
          - flash-sale
          - recommendation
          - cost
          - identity
          - risk
          - operations
          - openapi
          - catalog
          - promotion
          - experiment
          - advertising
          - supply-chain
          - finance
          - customer-service
          - forecasting
          - event-platform
          - data-warehouse
          - intelligence
          - analytics
          - traffic
          - reliability
          - release
          - platform-ops
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - protocol: TCP
          port: 8081
        - protocol: TCP
          port: 8082
        - protocol: TCP
          port: 8083
