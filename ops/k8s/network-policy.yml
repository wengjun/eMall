apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-checkout-internal-calls
spec:
  podSelector:
    matchExpressions:
      - key: app
        operator: In
        values:
          - inventory
          - pricing
          - marketing
          - order
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: order
        - podSelector:
            matchLabels:
              app: payment
      ports:
        - protocol: TCP
          port: 8083
        - protocol: TCP
          port: 8084
        - protocol: TCP
          port: 8087
        - protocol: TCP
          port: 8088
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-fulfillment-event-consumer-health
spec:
  podSelector:
    matchLabels:
      app: fulfillment
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: gateway
      ports:
        - protocol: TCP
          port: 8090
