server:
  port: 8111

spring:
  application:
    name: intelligence
  cloud:
    nacos:
      server-addr: ${EMALL_NACOS_SERVER_ADDR:localhost:8848}
      discovery:
        enabled: ${EMALL_NACOS_DISCOVERY_ENABLED:false}
        namespace: ${EMALL_NACOS_NAMESPACE:public}
        group: ${EMALL_NACOS_GROUP:DEFAULT_GROUP}
      config:
        enabled: ${EMALL_NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false
    sentinel:
      enabled: ${EMALL_SENTINEL_ENABLED:false}
      transport:
        dashboard: ${EMALL_SENTINEL_DASHBOARD:localhost:8858}
        port: ${EMALL_SENTINEL_API_PORT:8719}
  datasource:
    url: ${EMALL_INTELLIGENCE_DB_URL:jdbc:mysql://localhost:3306/emall_intelligence?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${EMALL_DB_USERNAME:root}
    password: ${EMALL_DB_PASSWORD:root}
  flyway:
    enabled: ${EMALL_FLYWAY_ENABLED:false}

emall:
  storage: jdbc

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
