server:
  port: 8116

spring:
  application:
    name: platform-ops
  datasource:
    url: ${EMALL_PLATFORM_OPS_DB_URL:jdbc:mysql://localhost:3306/emall_platform_ops?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${EMALL_DB_USERNAME:root}
    password: ${EMALL_DB_PASSWORD:root}
  flyway:
    enabled: true

emall:
  storage: jdbc

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
