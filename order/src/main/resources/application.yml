server:
  port: 8084

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%level","service":"${spring.application.name}","traceId":"%X{traceId:-}","spanId":"%X{spanId:-}","requestId":"%X{requestId:-}","userId":"%X{userId:-}","orderId":"%X{orderId:-}","route":"%X{route:-}","status":"%X{status:-}","latencyMs":"%X{latencyMs:-}","thread":"%thread","logger":"%logger{40}","message":"%replace(%msg){''"'',''\"''}","exception":"%replace(%ex{short}){''"'',''\"''}"}%n'

spring:
  application:
    name: order
  cloud:
    nacos:
      server-addr: ${EMALL_NACOS_SERVER_ADDR:localhost:8848}
      discovery:
        enabled: ${EMALL_NACOS_DISCOVERY_ENABLED:false}
        namespace: ${EMALL_NACOS_NAMESPACE:public}
        group: ${EMALL_NACOS_GROUP:DEFAULT_GROUP}
      config:
        enabled: ${EMALL_NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false
    sentinel:
      enabled: ${EMALL_SENTINEL_ENABLED:false}
      transport:
        dashboard: ${EMALL_SENTINEL_DASHBOARD:localhost:8858}
        port: ${EMALL_SENTINEL_API_PORT:8719}
  datasource:
    url: ${EMALL_ORDER_DB_URL:jdbc:mysql://localhost:3306/emall_order?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${EMALL_DB_USERNAME:root}
    password: ${EMALL_DB_PASSWORD:root}
  flyway:
    enabled: ${EMALL_FLYWAY_ENABLED:false}
  kafka:
    bootstrap-servers: ${EMALL_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

emall:
  storage: jdbc
  sharding:
    enabled: ${EMALL_SHARDING_ENABLED:false}
    database-prefix: ${EMALL_ORDER_DB_SHARD_PREFIX:emall_order}
    database-shard-count: ${EMALL_DB_SHARD_COUNT:16}
    logical-shard-count: ${EMALL_LOGICAL_SHARD_COUNT:64}
    default-cell-id: ${EMALL_CELL_ID:cell-a}
    tables:
      order_record:
        table-prefix: order_record
        table-shard-count: ${EMALL_TABLE_SHARD_COUNT:64}
      outbox_event:
        table-prefix: outbox_event
        table-shard-count: ${EMALL_OUTBOX_TABLE_SHARD_COUNT:64}
  ownership:
    enabled: ${EMALL_OWNERSHIP_ENABLED:false}
    current-region: ${EMALL_CURRENT_REGION:default-region}
    current-cell: ${EMALL_CURRENT_CELL:default-cell}
  internal:
    operations-token: ${EMALL_INTERNAL_OPERATIONS_TOKEN:local-dev-token}
    require-approval: ${EMALL_INTERNAL_REQUIRE_APPROVAL:false}
  events:
    topic: emall.order.events
  downstream:
    inventory-url: ${EMALL_INVENTORY_URL:http://localhost:8083}
    pricing-url: ${EMALL_PRICING_URL:http://localhost:8087}
    marketing-url: ${EMALL_MARKETING_URL:http://localhost:8088}
  rpc:
    protocol: ${EMALL_RPC_PROTOCOL:http}
  http-client:
    connect-timeout: ${EMALL_HTTP_CONNECT_TIMEOUT:300ms}
    read-timeout: ${EMALL_HTTP_READ_TIMEOUT:800ms}
    max-connections: ${EMALL_HTTP_MAX_CONNECTIONS:512}
    bulkhead-max-concurrent: ${EMALL_HTTP_BULKHEAD_MAX_CONCURRENT:256}
    max-attempts: ${EMALL_HTTP_MAX_ATTEMPTS:2}
    retry-backoff: ${EMALL_HTTP_RETRY_BACKOFF:50ms}
  trust:
    identity:
      enabled: ${EMALL_TRUST_IDENTITY_ENABLED:false}
      base-url: ${EMALL_IDENTITY_URL:http://localhost:8097}
      fail-closed: ${EMALL_TRUST_IDENTITY_FAIL_CLOSED:true}
    risk:
      enabled: ${EMALL_TRUST_RISK_ENABLED:false}
      base-url: ${EMALL_RISK_URL:http://localhost:8098}
      fail-closed: ${EMALL_TRUST_RISK_FAIL_CLOSED:true}
  resilience:
    sentinel:
      flows:
        order.inventory.reserve:
          qps: ${EMALL_SENTINEL_ORDER_INVENTORY_RESERVE_QPS:5000}
        order.inventory.confirm:
          qps: ${EMALL_SENTINEL_ORDER_INVENTORY_CONFIRM_QPS:5000}
        order.inventory.release:
          qps: ${EMALL_SENTINEL_ORDER_INVENTORY_RELEASE_QPS:5000}
        order.pricing.quote:
          qps: ${EMALL_SENTINEL_ORDER_PRICING_QUOTE_QPS:5000}
        order.marketing.quote:
          qps: ${EMALL_SENTINEL_ORDER_MARKETING_QUOTE_QPS:3000}

dubbo:
  application:
    name: ${spring.application.name}
    qos-enable: false
  protocol:
    name: tri
    port: ${EMALL_DUBBO_PORT:-1}
  registry:
    address: ${EMALL_DUBBO_REGISTRY_ADDRESS:N/A}
  consumer:
    check: false
    retries: 0
    timeout: 500

management:
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${EMALL_TRACING_SAMPLING_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${EMALL_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
