server:
  port: 8089

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%level","service":"${spring.application.name}","traceId":"%X{traceId:-}","spanId":"%X{spanId:-}","requestId":"%X{requestId:-}","userId":"%X{userId:-}","orderId":"%X{orderId:-}","route":"%X{route:-}","status":"%X{status:-}","latencyMs":"%X{latencyMs:-}","thread":"%thread","logger":"%logger{40}","message":"%replace(%msg){''"'',''\"''}","exception":"%replace(%ex{short}){''"'',''\"''}"}%n'

spring:
  application:
    name: search
  cloud:
    nacos:
      server-addr: ${EMALL_NACOS_SERVER_ADDR:localhost:8848}
      discovery:
        enabled: ${EMALL_NACOS_DISCOVERY_ENABLED:false}
        namespace: ${EMALL_NACOS_NAMESPACE:public}
        group: ${EMALL_NACOS_GROUP:DEFAULT_GROUP}
      config:
        enabled: ${EMALL_NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false
    sentinel:
      enabled: ${EMALL_SENTINEL_ENABLED:false}
      transport:
        dashboard: ${EMALL_SENTINEL_DASHBOARD:localhost:8858}
        port: ${EMALL_SENTINEL_API_PORT:8719}
  datasource:
    url: ${EMALL_SEARCH_DB_URL:jdbc:mysql://localhost:3306/emall_search?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${EMALL_DB_USERNAME:root}
    password: ${EMALL_DB_PASSWORD:root}
  elasticsearch:
    uris: ${EMALL_ELASTICSEARCH_URL:http://localhost:9200}
  flyway:
    enabled: ${EMALL_FLYWAY_ENABLED:false}
  kafka:
    bootstrap-servers: ${EMALL_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: search-indexer
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

emall:
  storage: jdbc
  sharding:
    enabled: ${EMALL_SHARDING_ENABLED:false}
    database-prefix: ${EMALL_SEARCH_DB_SHARD_PREFIX:emall_search}
    database-shard-count: ${EMALL_DB_SHARD_COUNT:16}
    logical-shard-count: ${EMALL_LOGICAL_SHARD_COUNT:64}
    default-cell-id: ${EMALL_CELL_ID:cell-a}
    tables:
      search_document:
        table-prefix: search_document
        table-shard-count: ${EMALL_TABLE_SHARD_COUNT:64}
      processed_message:
        table-prefix: processed_message
        table-shard-count: ${EMALL_TABLE_SHARD_COUNT:64}
  ownership:
    enabled: ${EMALL_OWNERSHIP_ENABLED:false}
    current-region: ${EMALL_CURRENT_REGION:default-region}
    current-cell: ${EMALL_CURRENT_CELL:default-cell}
  search:
    engine: elasticsearch
    url: ${EMALL_ELASTICSEARCH_URL:http://localhost:9200}
  events:
    product-topic: ${EMALL_PRODUCT_EVENTS_TOPIC:emall.product.events}
    product-dlt-topic: ${EMALL_PRODUCT_EVENTS_DLT_TOPIC:emall.product.events.dlt}
    product-consumer-max-attempts: ${EMALL_PRODUCT_EVENTS_CONSUMER_MAX_ATTEMPTS:4}

management:
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${EMALL_TRACING_SAMPLING_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${EMALL_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false
