emall:
  gateway:
    rate-limit:
      include-client-type: ${EMALL_RATE_LIMIT_INCLUDE_CLIENT_TYPE:true}
      include-channel: ${EMALL_RATE_LIMIT_INCLUDE_CHANNEL:true}
      include-device: ${EMALL_RATE_LIMIT_INCLUDE_DEVICE:true}
      include-sku: ${EMALL_RATE_LIMIT_INCLUDE_SKU:true}
      include-campaign: ${EMALL_RATE_LIMIT_INCLUDE_CAMPAIGN:true}
      include-region-cell: ${EMALL_RATE_LIMIT_INCLUDE_REGION_CELL:true}
      include-ip: ${EMALL_RATE_LIMIT_INCLUDE_IP:true}

management:
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${EMALL_TRACING_SAMPLING_PROBABILITY:0.1}
  otlp:
    tracing:
      endpoint: ${EMALL_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
---
spring:
  config:
    activate:
      on-profile: redis-cluster
  data:
    redis:
      cluster:
        nodes: ${EMALL_REDIS_CLUSTER_NODES:localhost:6379}
        max-redirects: ${EMALL_REDIS_CLUSTER_MAX_REDIRECTS:5}
