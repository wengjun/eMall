        - id: event-platform
          uri: ${EMALL_EVENT_PLATFORM_URL:lb://event-platform}
          predicates:
            - Path=/api/event-platform/**
        - id: data-warehouse
          uri: ${EMALL_DATA_WAREHOUSE_URL:lb://data-warehouse}
          predicates:
            - Path=/api/data-warehouse/**
        - id: intelligence
          uri: ${EMALL_INTELLIGENCE_URL:lb://intelligence}
          predicates:
            - Path=/api/intelligence/**
        - id: analytics
          uri: ${EMALL_ANALYTICS_URL:lb://analytics}
          predicates:
