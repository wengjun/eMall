server:
  port: 8080

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%level","service":"${spring.application.name}","traceId":"%X{traceId:-}","spanId":"%X{spanId:-}","requestId":"%X{requestId:-}","userId":"%X{userId:-}","orderId":"%X{orderId:-}","route":"%X{route:-}","status":"%X{status:-}","latencyMs":"%X{latencyMs:-}","thread":"%thread","logger":"%logger{40}","message":"%replace(%msg){''"'',''\"''}","exception":"%replace(%ex{short}){''"'',''\"''}"}%n'

spring:
  application:
    name: gateway
  data:
    redis:
      host: ${EMALL_REDIS_HOST:localhost}
      port: ${EMALL_REDIS_PORT:6379}
  cloud:
    nacos:
      server-addr: ${EMALL_NACOS_SERVER_ADDR:localhost:8848}
      discovery:
        enabled: ${EMALL_NACOS_DISCOVERY_ENABLED:false}
        namespace: ${EMALL_NACOS_NAMESPACE:public}
        group: ${EMALL_NACOS_GROUP:DEFAULT_GROUP}
      config:
        enabled: ${EMALL_NACOS_CONFIG_ENABLED:false}
        import-check:
          enabled: false
    sentinel:
      enabled: ${EMALL_SENTINEL_ENABLED:false}
      transport:
        dashboard: ${EMALL_SENTINEL_DASHBOARD:localhost:8858}
        port: ${EMALL_SENTINEL_API_PORT:8719}
    gateway:
      default-filters:
        - SecureHeaders
        - name: RequestRateLimiter
          args:
            key-resolver: "#{@userOrIpKeyResolver}"
            redis-rate-limiter.replenishRate: 1000
            redis-rate-limiter.burstCapacity: 2000
            redis-rate-limiter.requestedTokens: 1
      routes:
        - id: user
          uri: ${EMALL_USER_URL:lb://user}
          predicates:
            - Path=/api/users/**
        - id: product
          uri: ${EMALL_PRODUCT_URL:lb://product}
          predicates:
            - Path=/api/products/**
        - id: inventory
          uri: ${EMALL_INVENTORY_URL:lb://inventory}
          predicates:
            - Path=/api/inventory/**
        - id: order
          uri: ${EMALL_ORDER_URL:lb://order}
          predicates:
            - Path=/api/orders/**
        - id: cart
          uri: ${EMALL_CART_URL:lb://cart}
          predicates:
            - Path=/api/carts/**
        - id: payment
          uri: ${EMALL_PAYMENT_URL:lb://payment}
          predicates:
            - Path=/api/payments/**
        - id: pricing
          uri: ${EMALL_PRICING_URL:lb://pricing}
          predicates:
            - Path=/api/prices/**
        - id: marketing
          uri: ${EMALL_MARKETING_URL:lb://marketing}
          predicates:
            - Path=/api/marketing/**
        - id: search
          uri: ${EMALL_SEARCH_URL:lb://search}
          predicates:
            - Path=/api/search/**
        - id: fulfillment
          uri: ${EMALL_FULFILLMENT_URL:lb://fulfillment}
          predicates:
            - Path=/api/fulfillment/**
        - id: review
          uri: ${EMALL_REVIEW_URL:lb://review}
          predicates:
            - Path=/api/reviews/**
        - id: after-sales
          uri: ${EMALL_AFTER_SALES_URL:lb://after-sales}
          predicates:
            - Path=/api/after-sales/**
        - id: merchant
          uri: ${EMALL_MERCHANT_URL:lb://merchant}
          predicates:
            - Path=/api/merchants/**
        - id: flash-sale
          uri: ${EMALL_FLASH_SALE_URL:lb://flash-sale}
          predicates:
            - Path=/api/flash-sales/**
        - id: recommendation
          uri: ${EMALL_RECOMMENDATION_URL:lb://recommendation}
          predicates:
            - Path=/api/recommendations/**
        - id: cost
          uri: ${EMALL_COST_URL:lb://cost}
          predicates:
            - Path=/api/cost/**
        - id: identity
          uri: ${EMALL_IDENTITY_URL:lb://identity}
          predicates:
            - Path=/api/identity/**
        - id: risk
          uri: ${EMALL_RISK_URL:lb://risk}
          predicates:
            - Path=/api/risk/**
        - id: operations
          uri: ${EMALL_OPERATIONS_URL:lb://operations}
          predicates:
            - Path=/api/operations/**
        - id: openapi
          uri: ${EMALL_OPENAPI_URL:lb://openapi}
          predicates:
            - Path=/api/openapi/**
        - id: catalog
          uri: ${EMALL_CATALOG_URL:lb://catalog}
          predicates:
            - Path=/api/catalog/**
        - id: promotion
          uri: ${EMALL_PROMOTION_URL:lb://promotion}
          predicates:
            - Path=/api/promotions/**
        - id: experiment
          uri: ${EMALL_EXPERIMENT_URL:lb://experiment}
          predicates:
            - Path=/api/experiments/**
        - id: advertising
          uri: ${EMALL_ADVERTISING_URL:lb://advertising}
          predicates:
            - Path=/api/advertising/**
        - id: supply-chain
          uri: ${EMALL_SUPPLY_CHAIN_URL:lb://supply-chain}
          predicates:
            - Path=/api/supply-chain/**
        - id: finance
          uri: ${EMALL_FINANCE_URL:lb://finance}
          predicates:
            - Path=/api/finance/**
        - id: customer-service
          uri: ${EMALL_CUSTOMER_SERVICE_URL:lb://customer-service}
          predicates:
