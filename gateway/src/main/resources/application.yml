server:
  port: 8080

logging:
  pattern:
    console: '{"timestamp":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%level","service":"${spring.application.name}","traceId":"%X{traceId:-}","spanId":"%X{spanId:-}","requestId":"%X{requestId:-}","userId":"%X{userId:-}","orderId":"%X{orderId:-}","route":"%X{route:-}","status":"%X{status:-}","latencyMs":"%X{latencyMs:-}","thread":"%thread","logger":"%logger{40}","message":"%replace(%msg){''"'',''\"''}","exception":"%replace(%ex{short}){''"'',''\"''}"}%n'

spring:
  application:
    name: gateway
  data:
    redis:
      host: ${EMALL_REDIS_HOST:localhost}
      port: ${EMALL_REDIS_PORT:6379}
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            key-resolver: "#{@userOrIpKeyResolver}"
            redis-rate-limiter.replenishRate: 1000
            redis-rate-limiter.burstCapacity: 2000
            redis-rate-limiter.requestedTokens: 1
      routes:
        - id: user
          uri: ${EMALL_USER_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
        - id: product
          uri: ${EMALL_PRODUCT_URL:http://localhost:8082}
          predicates:
            - Path=/api/products/**
        - id: inventory
          uri: ${EMALL_INVENTORY_URL:http://localhost:8083}
          predicates:
            - Path=/api/inventory/**
        - id: order
          uri: ${EMALL_ORDER_URL:http://localhost:8084}
          predicates:
            - Path=/api/orders/**
        - id: cart
          uri: ${EMALL_CART_URL:http://localhost:8085}
          predicates:
            - Path=/api/carts/**
        - id: payment
          uri: ${EMALL_PAYMENT_URL:http://localhost:8086}
          predicates:
            - Path=/api/payments/**
        - id: pricing
          uri: ${EMALL_PRICING_URL:http://localhost:8087}
          predicates:
            - Path=/api/prices/**
        - id: marketing
          uri: ${EMALL_MARKETING_URL:http://localhost:8088}
          predicates:
            - Path=/api/marketing/**
        - id: search
          uri: ${EMALL_SEARCH_URL:http://localhost:8089}
          predicates:
            - Path=/api/search/**
        - id: fulfillment
          uri: ${EMALL_FULFILLMENT_URL:http://localhost:8090}
          predicates:
            - Path=/api/fulfillment/**
        - id: review
          uri: ${EMALL_REVIEW_URL:http://localhost:8091}
          predicates:
            - Path=/api/reviews/**
        - id: after-sales
